services:
  proxy:
    build: .
    image: seby-tv-proxy
    container_name: seby-tv-proxy
    # Portul 8080 e vizibil DOAR pentru ngrok în rețeaua Docker internă
    expose:
      - '8080'
    environment:
      - PORT=8080
      - PLAYLIST_URL=https://iptv-org.github.io/iptv/languages/ron.m3u
      - IDLE_MS=30000
      - START_TIMEOUT_MS=15000
      - MAX_SESSIONS=20
      - PLAYLIST_REFRESH_MS=21600000
    restart: unless-stopped
    tmpfs:
      - /tmp

  ngrok:
    image: ngrok/ngrok:latest
    container_name: seby-tv-ngrok
    restart: unless-stopped
    environment:
      # Token-ul tău de pe contul ngrok
      - NGROK_AUTHTOKEN=3Gs2gM2xKel5D6o3X2bY0Z29BN2_83m6NnudEeVTW7GqddCqu
    # Comanda care expune proxy:8080 pe domeniul tău
    command:
      - "http"
      - "proxy:8080"
      - "--url=charging-impart-musket.ngrok-free.dev"
    depends_on:
      - proxy
